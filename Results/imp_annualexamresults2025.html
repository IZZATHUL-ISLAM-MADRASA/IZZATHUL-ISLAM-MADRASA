    <style>
        :root {
            --primary: #152c21; /* Islamic Green */
            --secondary: #d4af37; /* Gold */
            --bg-color: #f4f7f6;
            --text-dark: #2c3e50;
            --white: #ffffff;
            --danger: #dc3545;
            --success: #198754;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* --- Header --- */
        header {
            background: linear-gradient(205deg, var(--primary), #0f4b31);
            color: var(--white);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .logo {
            width: 100px;
            height: auto;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3));
        }

        .header-text h1 {
            font-family: 'Amiri', serif;
            font-size: 2rem;
            color: var(--secondary);
            margin-bottom: 5px;
        }

        .header-text h2 {
            font-size: 1.5rem;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .header-text h3 {
            font-size: 0.8rem;
            font-weight: 300;
            opacity: 0.9;
        }

        /* --- Container & Forms --- */
        .container {
            width: auto;
            max-width: 1000px;

            margin: 30px auto;
            padding: 0 20px;
            min-height: 60vh;
        }

        .card {
            background: var(--white);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            margin-bottom: 20px;
            border-top: 5px solid var(--secondary);
        }

        .card h2 {
            text-align: center;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text-dark);
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(15, 81, 50, 0.1);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: var(--secondary);
            color: #000;
        }

        /* --- Action Buttons --- */
        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .print-btn {
            background-color: #6c757d;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .print-btn:hover { opacity: 0.9; }

        /* --- Result Styling --- */
        .result-header {
            display: flex;
            justify-content: space-between;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #dee2e6;
        }

        .student-info p { margin: 5px 0; }
        .fail-row {
    background-color: #ffe5e5;
    color: #d00;
}
        .status {
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .status.passed { background-color: #d1e7dd; color: var(--success); }
        .status.failed { background-color: #f8d7da; color: var(--danger); }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
        }

        th {
            background-color: rgb(9, 63, 33);
            color: var(--white);
            font-weight: 500;
        }

        tr:nth-child(even) { background-color: #f8f9fa; }
        
        tr.fail-row { background-color: #f0be85; }
        tr.fail-row td { color: #e0631a; font-weight: bold; }

        /* --- Loading Spinner --- */
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: var(--primary);
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- Footer --- */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.9rem;
            color: #6c757d;
            margin-top: auto;
        }

        /* --- Print Media Query --- */
        @media print {
            @page{
                margin: 0;
                margin: 5mm 5mm 5mm 5mm;

            }

            .no-print, .btn, .form-group, footer, .card-shadow {
                display: none !important;
            }
            .card {
                width: 100% !important;
                box-shadow: none !important;
                border-radius: 0 !important;
                border: none;
                box-shadow: none;
                padding: 0;
            }
            header {
                box-shadow: none;
                print-color-adjust: exact;
                background: white !important;
                color: black !important;
                border-bottom: 2px solid black;
            }
            .header-text h1 { color: black !important; }
            
            body { background-color: white;
            width: auto !important;
            height: auto !important;
            color: black !important;
            overflow: hidden !important;
            font-size: medium;
            
        }
            table{
                width: 100%;
                border: #000 solid 1px;
                border-collapse: collapse;
                border-spacing: 0;
                padding: auto;
                overflow: hidden;
                text-align: center;
            }
            td{
                padding: 0%;
                font-size: 0.75rem;
                border: #000 solid 1px;
                text-align: center;
            }
           th {
            border: #000 solid 1px;
    background-color: #e0e0e0 !important;
    color: black !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;

    /* --- HEIGHT SETTINGS --- */
    height: 100px;           /* Forces the cell to be tall */
    max-height: 100px;       /* Limits the height */
    
    /* --- VERTICAL TEXT SETTINGS --- */
    writing-mode: vertical-rl; /* Makes text vertical */
    transform: rotate(180deg); /* Flips it to read Bottom-to-Top */
    
    /* --- ALIGNMENT --- */
    text-align: center;      /* Centers text horizontally in the column */
    vertical-align: middle;  /* Centers text vertically within the cell space */
    
    /* --- OPTIONAL CLEANUP --- */
    white-space: WRAP;     /* Keeps text on one line */
    padding: 5px;            /* Adds breathing room */
    width: 40px;             /* Optional: Force narrow columns */
}
        }

        /* --- Responsive --- */
        @media (max-width: 600px) {
            .result-header { flex-direction: column; gap: 10px; }
            th, td { padding: 8px; font-size: 0.9rem; }
            .header-text h1 { font-size: 1.5rem; }
        }
    </style>
</head>

    <script>
       let className = "";
        // ==========================================
        // 1. CORE SEARCH LOGIC
        // ==========================================
        function fetchStudentData(event) {
            event.preventDefault();
            
            const admissionNumber = document.getElementById("admissionNumber").value.trim().toUpperCase();
            const classInput = document.getElementById("class").value;
            const division = document.getElementById("division").value;
            className = classInput + " " + division; 
            const exam = document.getElementById("exam").value;


            // --- ADMIN LOGIN CHECK ---
            if (admissionNumber === "ONUSTH@D" || admissionNumber === "USTH@D") {
                const mode = admissionNumber === "ONUSTH@D" ? "online" : "offline";
                initAdminDashboard(mode,exam);
                return;
            }

            // --- VALIDATION ---
            if (!classInput || !division) {
                alert("Please select Class and Division.");
                return;
            }

            // --- UI UPDATE ---
            showLoading(true);
            document.getElementById("searchSection").style.display = "none";
            document.getElementById("resultSection").style.display = "none";

            // --- API URL BUILDER ---
            let isOnline = admissionNumber.startsWith("ON");
            let url = isOnline ? API_ONLINE : API_OFFLINE;
            let sheetId = isOnline ? sheetid_online[exam] : sheetid_offline[exam];
            
console.log("Fetching data for:", { admissionNumber, classInput, division, exam, isOnline, sheetId });
            url += `?admission_number=${admissionNumber}&class=${classInput}&division=${division}&sheet=${sheetId}&exam=${exam}`;

            // --- FETCH DATA ---
            fetch(url)
                .then(response => response.json())
                .then(data => {
                    showLoading(false);
                    if (data) {
                        console.log("API Response:", data);
                        document.getElementById("resultSection").style.display = "block";
                        if (isOnline) {
                            renderOnlineResult(data);
                            //renderStandardResultannual(data);
                        } else {
                            if(exam === "Annual-Term"){
                                renderStandardResultannual(data);
                            } else {                    
                            renderStandardResult(data);
                        }
                    }
                    } else {
                        console.log("API Response:", data);
                        alert(data);
                        document.getElementById("searchSection").style.display = "block";
                    }
                })
                .catch(error => {
                    showLoading(false);
                    console.error(error);
                    alert("Network Error. Please try again.");
                    document.getElementById("searchSection").style.display = "block";
                });
        }

        // ==========================================
        // HELPER: PARSE MARKS (Handles 'AB')
        // ==========================================
        function parseMarkValue(rawValue) {
            // Check if value is AB (case insensitive)
            if (typeof rawValue === 'string' && rawValue.trim().toUpperCase() === 'AB') {
                return { value: 0, isAbsent: true, display: 'AB' };
            }
            
            // Standard number parsing
            const parsed = parseInt(rawValue);
            const val = isNaN(parsed) ? 0 : parsed;
            return { value: val, isAbsent: false, display: val };
        }

        // ==========================================
        // 2. RENDER FUNCTIONS (Single Student)
        // ==========================================
        function renderStandardResult(data) {
    // 1. Get the selected Exam Name from the dropdown
    const examSelect = document.getElementById("exam");
    const examName = examSelect.options[examSelect.selectedIndex].text; 

    let totalMax = 0;
    let totalObt = 0;
    let allPassed = true;

    let rows = data.marks.map(mark => {
        const max = parseInt(mark.max_mark) || 50;

        // Use Helper to check for AB
        const rawObt = mark.obtained_mark || mark.obtMark;
        const markData = parseMarkValue(rawObt);

        const grade = calculateGrade(max, markData.value);

        // Logic: A+ to C is pass, D/F is fail. AB (0 marks) results in Fail.
        const isSubjectPass = !["D", "F"].includes(grade);
        if (!isSubjectPass) allPassed = false;

        totalMax += max;
        totalObt += markData.value; // Adds 0 if AB

        // Style for AB
        const displayHtml = markData.isAbsent
            ? `<span style="color:red; font-weight:bold;">AB</span>`
            : markData.display;

        return `
            <tr class="${isSubjectPass ? '' : 'fail-row'}">
                <td>${mark.subject}</td>
                <td>${max}</td>
                <td>${displayHtml}</td>
                <td>${grade}</td>
            </tr>`;
    }).join('');

    const headerHtml = generateStudentHeader(data.student, allPassed, totalObt, totalMax);

    // 2. Create the Exam Title HTML
    const examTitleHtml = `
        <div style="text-align: center; margin-bottom: 20px;">
            <h3 style="color: var(--primary); text-transform: uppercase; border-bottom: 2px solid var(--secondary); display: inline-block; padding: 0 10px 5px;">
                ${examName} Result
            </h3>
        </div>
    `;

    const tableHtml = `
        <h3>Marks Details</h3>
        <table>
            <thead>
                <tr><th>Subject</th><th>Max Marks</th><th>Obtained</th><th>Grade</th></tr>
            </thead>
            <tbody>${rows}</tbody>
        </table>`;

    // 3. Add examTitleHtml at the very beginning
    document.getElementById("resultContent").innerHTML = examTitleHtml + headerHtml + tableHtml;
}

function renderStandardResultannual(data) {
  
    const resultContent = document.getElementById("resultContent");
    const examSelect = document.getElementById("exam");
    
    const examName = examSelect ? examSelect.options[examSelect.selectedIndex].text : "Examination Result";
    

    // Validate data structure
    if (!data || !data.marks || !Array.isArray(data.marks)) {
        resultContent.innerHTML = "<p style='color:red;'>Error: Marks data not found.</p>";
        return;
    }

    const student = data.details || {};
    let totalMax = 0;
    let totalObt = 0;
    let allPassed = true;

    // Filter out "SlNo" and build rows
    let rows = data.marks
        .filter(item => item.subject !== "SlNo")
        .map(mark => {
            const maxAllowed = parseInt(mark.max) || 50; // 'min' in your JSON is 50
            const passRequirement = parseInt(mark.min) || 18; // 'max' in your JSON is 18
            const scoreReceived = mark.score;

            let obtValue = 0;
            let displayScore = "";
            let isAbsent = (scoreReceived === "AB" || scoreReceived === "Absent");

            if (isAbsent) {
                obtValue = 0;
                displayScore = `<span style="color:red; font-weight:bold;">AB</span>`;
            } else {
                obtValue = parseFloat(scoreReceived) || 0;
                displayScore = scoreReceived === "" ? "0" : scoreReceived;
            }

            // --- Kerala Syllabus Grading Logic ---
            let grade = "E";
            const per = maxAllowed > 0 ? (obtValue / maxAllowed) * 100 : 0;

            if (isAbsent) grade = "Ab";
            else if (per > 90) grade = "A+";
            else if (per > 80) grade = "A";
            else if (per > 70) grade = "B+";
            else if (per > 60) grade = "B";
            else if (per > 50) grade = "C+";
            else if (per > 40) grade = "C";
            else if (per >= 36) grade = "D+";
            else if (per >= 20) grade = "D";
            else grade = "E";

            // Logic: Must reach the passRequirement AND not be Absent
            const isSubjectPass = !isAbsent && (obtValue >= passRequirement);
            if (!isSubjectPass) allPassed = false;

            totalMax += maxAllowed;
            totalObt += obtValue;

            return `
                <tr style="border-bottom: 1px solid #eee;">
                    <td style="padding: 10px; text-align: left;">${mark.subject}</td>
                    <td style="padding: 10px; text-align: center;">${maxAllowed}</td>
                    <td style="padding: 10px; text-align: center;">${displayScore}</td>
                    <td style="padding: 10px; text-align: center; font-weight: bold; color: ${isSubjectPass ? '#27ae60' : '#e74c3c'};">
                        ${grade}
                    </td>
                </tr>`;
        }).join('');

    const finalResultStatus = allPassed ? "PASSED" : "FAILED / NEED IMPROVEMENT";
    const themeColor = allPassed ? "#27ae60" : "#e74c3c";
    const examTitleHtml = `
        <div style="text-align:center; margin-bottom:20px;">
            <h3 style="color:var(--primary); text-transform:uppercase; border-bottom:2px solid var(--secondary); display:inline-block; padding:0 10px 5px;">
                ${examName} Result
            </h3>
        </div>
    `;
        const headerHtml = generateStudentHeaderannual(data.details, data.isPassed, totalObt, totalMax, className);

    resultContent.innerHTML = `
        <div style="font-family: 'Segoe UI', Arial, sans-serif; max-width: 600px; margin: 20px auto; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
            ${examTitleHtml}
            ${headerHtml}
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="background: #f4f4f4; color: #555; font-size: 0.9rem;">
                        <th style="padding: 12px; text-align: left;">Subject</th>
                        <th style="padding: 12px;">Max</th>
                        <th style="padding: 12px;">Obtained</th>
                        <th style="padding: 12px;">Grade</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>

            <div style="padding: 15px; background: #f9f9f9; display: flex; justify-content: space-between; align-items: center; border-top: 2px solid #eee; font-weight: bold;">
                <span>Total Marks: ${totalObt} / ${totalMax}</span>
                <span style="color: ${themeColor};">${((totalObt / totalMax) * 100).toFixed(1)}%</span>
            </div>
        </div>
    `;
}

function renderOnlineResult(data) {
    const examSelect = document.getElementById("exam");
    const examName = examSelect.options[examSelect.selectedIndex].text; 

    const container = document.getElementById("resultContent");
    const isPassed = data.isPassed;
    
    // Get Class and Division from your inputs
   
    let totalObt = 0;
    let totalMax = 0;

    let rowsHtml = "";

// Helper function to calculate Grade
function calculateGrade(max, obt) {
    if (!max || max === 0) return "-";
    const percentage = (obt / max) * 100;
    if (percentage > 90) return "A+";
    if (percentage > 80) return "A";
    if (percentage > 70) return "B+";
    if (percentage > 60) return "B";
    if (percentage > 50) return "C+";
    if (percentage >= 40) return "C";
    return "D";
}

            // Safety check: ensure result is actually visible before downloading
            if (!resultElement || resultElement.style.display === 'none') {
                alert("Please search for a result before downloading.");
                return;
            }

            // 2. Create a temporary container to hold our "screenshot view"
            // We position it off-screen so the user doesn't see it
            const tempContainer = document.createElement('div');
            tempContainer.style.width = '600px'; // Set fixed width for a consistent look
            tempContainer.style.backgroundColor = '#f4f7f6'; // Match your var(--bg-color)
            tempContainer.style.position = 'absolute';
            tempContainer.style.top = '0';
            tempContainer.style.left = '-9999px'; // Hide it off-screen
            tempContainer.style.zIndex = '-1';
            tempContainer.style.fontFamily = "'Poppins', sans-serif"; // Ensure fonts match
            // ontsize increasse for better readability
            tempContainer.style.fontSize = '14px';
           
            // 3. Clone the Header and Result Section
            const headerClone = headerElement.cloneNode(true);
            const resultClone = resultElement.cloneNode(true);

            // 4. Cleanup the Result Clone (Remove buttons)
            const buttons = resultClone.querySelector('.action-buttons');
            if (buttons) buttons.remove();

            // Add some margin to the result card inside the image so it looks nice
            resultClone.style.margin = "20px";
            
            // 5. Append clones to the temp container
            tempContainer.appendChild(headerClone);
            tempContainer.appendChild(resultClone);

            // 6. Append temp container to body (html2canvas needs it to be in the DOM)
            document.body.appendChild(tempContainer);

            // 7. Generate the Image
            html2canvas(tempContainer, {
                scale: 2, // High quality
                useCORS: true, // Allow loading the Logo image
                allowTaint: true,
                backgroundColor: '#f4f7f6'
            }).then(canvas => {
                // Create download link
                const link = document.createElement("a");
                const studentName = document.querySelector(".student-info h2")?.innerText || "Student";
                link.download = "Result_" + studentName + ".png";
                link.href = canvas.toDataURL("image/png");
                document.body.appendChild(link);
                link.click();
                
                // Cleanup
                document.body.removeChild(link);
                document.body.removeChild(tempContainer);
            }).catch(err => {
                console.error("Image generation failed:", err);
                alert("Could not generate image. Please try printing to PDF instead.");
                // Cleanup on error
                if(document.body.contains(tempContainer)) {
                    document.body.removeChild(tempContainer);
                }
            });
        }

    ];

    // Define Table Rows (Body)
    const tableBody = data.map((entry, index) => {
        const s = entry.student;
        let rowTotal = 0;
        let hasFail = false;

        // Map marks for easy lookup
        const marksMap = {};
        entry.marks.forEach(m => {
            // Your existing logic to handle AB or numerical marks
            const rawVal = m.written || m.obtMark || m.obtained_mark;
            marksMap[m.subject] = parseMarkValue(rawVal); // Assuming parseMarkValue is defined in your code
        });

        // Build the cells for subjects
        const subjectCells = subjectArr.map(sub => {
            const mData = marksMap[sub];
            if (!mData) return "-";
            
            if (mData.isAbsent) {
                hasFail = true;
                return "AB";
            } else {
                rowTotal += mData.value;
                if (mData.value < 18) hasFail = true; // Fail condition
                return mData.value;
            }
        });

        const status = hasFail ? 'Fail' : 'Pass';

        return [
            index + 1,
            s.name,
            s.admission_number,
            `${s.attendance}/${s.total_working_days}`,
            ...subjectCells,
            rowTotal,
            status,
            s.rank || "-"
        ];
    });

    // --- 2. ADD THE HEADER ---
    
    const pageWidth = doc.internal.pageSize.getWidth();
    const centerX = pageWidth / 2;

    // A. Add Logo (Make sure image path is correct/accessible)
    const logoImg = new Image();
    logoImg.src = "src/assets/madrasa logo png.png"; 
    
    // We wrap this in a promise or simple flow logic, but for simplicity:
    // We add the text immediately, and the image if it loads.
    
    // Title Text
    doc.setFont("helvetica", "bold");
    doc.setFontSize(18);
    doc.text("IZZATHUL ISLAM MADRASA", centerX, 20, { align: "center" });
    
    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.text("3rd floor, Masjid-e-Rahmania, Bangalore-560078", centerX, 26, { align: "center" });

    // Exam Name & Class Info
    const cls = document.getElementById("adminClass").value;
    const div = document.getElementById("adminDivision").value;
    const examName = "Second Term Examination"; // Or grab dynamically

    doc.setFontSize(14);
    doc.setFont("helvetica", "bold");
    doc.text(examName, centerX, 35, { align: "center" });
    
    doc.setFontSize(12);
    doc.text(`Class Report: ${cls} - ${div}`, centerX, 42, { align: "center" });

    // Optional: Draw a line under header
    doc.setLineWidth(0.5);
    doc.line(10, 45, pageWidth - 10, 45);

    // --- 3. GENERATE THE TABLE ---
    
    doc.autoTable({
        head: tableHeaders,
        body: tableBody,
        startY: 50, // Start below the header
        theme: 'grid', // 'striped', 'grid', 'plain'
        styles: { 
            fontSize: 9, 
            halign: 'center', 
            valign: 'middle' 
        },
        headStyles: { 
            fillColor: [22, 160, 133], // Greenish header color
            textColor: 255,
            fontStyle: 'bold'
        },
        // Highlight logic for Status column
        didParseCell: function (data) {
            // Logic to color "Fail" or "AB" cells
            if (data.section === 'body') {
                // If the cell content is "AB" or "Fail", make text red
                if (data.cell.raw === "AB" || data.cell.raw === "Fail") {
                    data.cell.styles.textColor = [255, 0, 0]; // Red
                    data.cell.styles.fontStyle = 'bold';
                }
            }
        }
    });

    // --- 4. SAVE ---
    doc.save(`Result_List_${cls}_${div}.pdf`);
}
