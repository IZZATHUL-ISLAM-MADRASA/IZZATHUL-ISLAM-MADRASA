<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Search</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #f4f4f4;
    padding: 20px;
    flex-direction: column;
    }

    .container {
      width: 100%;
      max-width: 400px;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

        /* Header */
h1 {
    color: #007bff;
    text-align: center;
    margin-bottom: 20px;
    font-size: 2rem;
}

    /* Header Section */
.header {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 20px;
    background-color: #f8f9fa;
    border-bottom: 2px solid #ddd;
}

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    label {
      display: block;
      text-align: left;
      font-weight: bold;
      margin-top: 10px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      border: none;
      background: #007bff;
      color: white;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #0056b3;
    }

    .result {
      margin-top: 20px;
      font-size: 16px;
      font-weight: bold;
      color: #333;
    }

    .error {
      color: red;
    }

    @media (max-width: 480px) {
      .container {
        padding: 15px;
      }

      h2 {
        font-size: 18px;
      }

      input,
      button {
        font-size: 14px;
      }
    }

    /* Container for the loader */
.loader-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  gap: 15px;
}

/* The Spinning Ring */
.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #f3f3f3;
  border-top: 4px solid #2563eb; /* School Blue */
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

/* Searching Text Animation */
.searching-text {
  font-family: 'Segoe UI', sans-serif;
  font-weight: 600;
  color: #1e293b;
  letter-spacing: 1px;
  animation: pulseText 1.5s infinite ease-in-out;
}

/* Success Card Styling */
.success-card {
  background: #f0fdf4;
  border: 1px solid #bbf7d0;
  padding: 15px;
  border-radius: 10px;
  color: #166534;
  display: inline-block;
  animation: slideIn 0.4s ease-out;
}

/* Keyframes */
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@keyframes pulseText {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.98); }
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
  </style>
</head>

<body>

  <header class="header">
    <div class="header-text">
      <h1>مدرسة عزة الإسلام</h1>
      <h2>IZZATHUL ISLAM MADRASA</h2>
      <h3>3rd floor, Masjid-e-Rahmania, 6th Main Rd, Minhaj Nagar, Bendre Nagar, Bengaluru, Karnataka-560078</h3>
  </div>
   
  
</header>

  <div class="container">
    <h2>Search Student Admission Number</h2>

    <label for="class">Class:</label>
    <input type="text" id="class" placeholder="Enter Class" required>

    <label for="division">Division:</label>
    <input type="text" id="division" placeholder="Enter Division" required>

    <label for="dob">Date of Birth:</label>
    <input type="date" id="dob" required>

    <button onclick="searchStudent()">Search</button>

    <p class="result" id="result"></p>
  </div>
  <footer style="text-align: center; padding: 10px; background-color: #f8f9fa; font-size: 14px;">
    <p>©
        <script>document.write(new Date().getFullYear());</script> All Rights Reserved | Powered by
        <a href="" target="_blank"
            style="text-decoration: none; font-weight: bold; color: #007bff;">IIM BANGALURU</a>
    </p>
</footer>

  <script>
    function searchStudent() {
  const studentClass = document.getElementById("class").value.trim();
  const division = document.getElementById("division").value.trim().toUpperCase();
  const dob = document.getElementById("dob").value.trim();

  const resultElement = document.getElementById("result");
  resultElement.innerHTML = "";

  if (!studentClass || !division || !dob) {
    resultElement.innerHTML = `<span class="error">Please fill in all fields.</span>`;
    return;
  }

  // --- ANIMATED SEARCHING STATE ---
  resultElement.innerHTML = `
    <div class="loader-container">
      <div class="spinner"></div>
      <span class="searching-text">Searching Database...</span>
    </div>
  `;

  const apiUrl = `https://script.google.com/macros/s/AKfycbzJNA0epux3dpxnF1MU9XyYL74PJtejpUxoYPWINPBgqgqaZs_AhoH_YyQCWHfyD--f9w/exec?class=${studentClass}&division=${division}&dob=${dob}`;

  fetch(apiUrl)
    .then(response => response.json())
    .then(data => {
      if (data.error) {
        resultElement.innerHTML = `<span class="error">❌ ${data.error}</span>`;
      } else {
        resultElement.innerHTML = `
          <div class="success-card">
            ✅ <strong>Admission Number:</strong> ${data.admission_number} <br> 
            <strong>Full Name:</strong> ${data.name}
          </div>`;
      }
    })
    .catch(error => {
      resultElement.innerHTML = `<span class="error">❌ Failed to fetch data.</span>`;
    });
}
  </script>

</body>

</html>
